<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="icons/pwa-192x192.png">

  <!-- SEO Meta Tags -->
  <meta name="description" content="HostelEnglish: La app definitiva para dominar el vocabulario profesional de hostelería en inglés y euskera. Frases, diálogos, flashcards y exámenes interactivos." />
  <meta name="theme-color" content="#1a252f" />
  <meta property="og:title" content="HostelEnglish — Aprende inglés para hostelería" />
  <meta property="og:description" content="Domina el vocabulario y las expresiones esenciales para destacar en el mundo de la hostelería profesional." />
  <meta property="og:type" content="website" />

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <!-- Seguridad y CSP -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self' https://*.googleapis.com https://*.google.com https://translate.google.com; media-src 'self' https://translate.google.com data:; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'self'; object-src 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer-when-downgrade">

  <!-- Protección Anti-Clickjacking (Fallback para GH Pages ya que frame-ancestors requiere cabecera HTTP) -->
  <style id="antiClickjack">
    body {
      display: none !important;
    }
  </style>
  <script type="text/javascript">
    if (self === top) {
      var antiClickjack = document.getElementById("antiClickjack");
      if (antiClickjack) antiClickjack.parentNode.removeChild(antiClickjack);
    } else {
      top.location = self.location;
    }
  </script>

  <title>HostelEnglish — Aprende inglés para hostelería</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>

</html>
